services:
  postgres:
    image: postgres:16-alpine
    container_name: news_analysis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: news
      POSTGRES_PASSWORD: news
      POSTGRES_DB: news_analysis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news -d news_analysis"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
